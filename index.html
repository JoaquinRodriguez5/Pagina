<!DOCTYPE html>
<html>
<head>
<title>Profesionales Online</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

#contenedor{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:250px;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Consultá con profesionales</h1>

<div id="contenedor"></div>

<script>

fetch("profesionales.json")
.then(res => res.json())
.then(data => {

let contenedor = document.getElementById("contenedor");

data.forEach(pro => {

let card = `
<div class="card">
<h2>${pro.nombre}</h2>
<p>${pro.descripcion}</p>
<a href="https://wa.me/${pro.whatsapp}" target="_blank">
<button>Contactar</button>
</a>
</div>
`;

contenedor.innerHTML += card;

});

});

</script>

</body>
</html>
