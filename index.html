<!DOCTYPE html>
<html>

<head>
<title>Profesionales Online</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

#contenedor{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:250px;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

input{
display:block;
margin:10px auto;
padding:8px;
width:200px;
}

</style>

</head>

<body>

<h1>Profesionales disponibles</h1>

<div id="contenedor"></div>

<h2>Registrarte como profesional</h2>

<input id="nombre" placeholder="Tu nombre">
<input id="profesion" placeholder="Profesión">
<input id="whatsapp" placeholder="WhatsApp">

<button onclick="registrar()">Registrarme</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCSaq4d8gEOT3Wt90_QA2OL5YKgtewC-RI",
authDomain: "pagina-web-f6732.firebaseapp.com",
projectId: "pagina-web-f6732",
storageBucket: "pagina-web-f6732.firebasestorage.app",
messagingSenderId: "693547252741",
appId: "1:693547252741:web:ceb8261ec7365aaf4df06c",
measurementId: "G-N77EC259YS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.registrar = async function(){

let nombre = document.getElementById("nombre").value;
let profesion = document.getElementById("profesion").value;
let whatsapp = document.getElementById("whatsapp").value;

await addDoc(collection(db,"profesionales"),{
nombre:nombre,
profesion:profesion,
whatsapp:whatsapp
});

alert("Registro exitoso");

}

const contenedor = document.getElementById("contenedor");

onSnapshot(collection(db,"profesionales"),(snapshot)=>{

contenedor.innerHTML="";

snapshot.forEach((doc)=>{

let p = doc.data();

let card = `
<div class="card">
<h3>${p.nombre}</h3>
<p>${p.profesion}</p>
<a href="https://wa.me/${p.whatsapp}" target="_blank">
<button>Contactar</button>
</a>
</div>
`;

contenedor.innerHTML += card;

});

});

</script>

</body>
</html>

</script>

</body>
</html>
